name: Sync to Hugging Face hub
on:
  push:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # REPLACE "YOUR_HF_USERNAME/YOUR_SPACE_NAME" with your actual username and space name
          SPACE_REPO: "YOUR_HF_USERNAME/removo-api"
        run: git push https://user:$HF_TOKEN@huggingface.co/spaces/$SPACE_REPO main -f
